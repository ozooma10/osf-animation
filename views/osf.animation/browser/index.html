<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OSF Animation Browser</title>
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body class="osf-animation">
  <div class="stage">
    <div class="console">
      <span class="bracket tl"></span><span class="bracket tr"></span>
      <span class="bracket bl"></span><span class="bracket br"></span>
      <div class="grid-overlay"></div>

      <!-- ===== SLATE (slim: brand · live take · tools) ===== -->
      <div class="slate">
        <div class="slate-cell slate-brand">
          <div class="brand-emblem"><span></span></div>
          <div>
            <div class="brand-title">Animation Browser</div>
            <div class="brand-sub"><span id="lamp" class="lamp" data-state="wait"></span><span id="statusText">connecting…</span></div>
          </div>
        </div>
        <div class="slate-cell slate-take" id="slateTake"></div>
        <div class="slate-cell slate-tools">
          <div class="author-wrap">
            <button id="refresh" class="iconbtn" type="button" title="Refresh catalog">⟳</button>
            <span class="lbl">AUTHOR</span>
            <button id="authorToggle" class="switch" type="button" aria-label="Toggle author mode"><i></i></button>
            <button class="iconbtn" type="button" title="Minimize — watch the scene" data-act="minimize"><svg class="chev-ico" width="10" height="9" viewBox="0 0 10 9" aria-hidden="true"><path d="M1 1l4 3.8L9 1"/><path d="M1.2 8h7.6"/></svg></button>
          </div>
        </div>
      </div>
      <div class="stripe"><span></span><span></span><span></span></div>

      <!-- ===== BODY: guided rail (cast · anchor) over browse ===== -->
      <div class="director">
        <aside id="rail" class="rail"></aside>
        <section id="browse" class="browse"></section>
      </div>

      <footer id="notice" class="notice" aria-live="polite"></footer>
    </div>

    <!-- Floating brief: selected scene + launch controls, bottom-right so the
         world (the focal point you framed before opening) stays center-screen. -->
    <aside id="brief" class="brief"></aside>

    <!-- Live bar: the minimized browser (body.live-mode) — a small floating chip with the
         running take + stop/expand, so the world/scene owns the screen. See renderLivebar. -->
    <div id="livebar" class="livebar"></div>

    <!-- Emote wheel: transient radial mode (osf.mode {mode:"wheel"}); replaces the
         console/brief while active. Content rendered by main.js (renderWheel). -->
    <div id="wheel" class="wheel"></div>
  </div>

  <script src="main.js?v=3"></script>
</body>
</html>
