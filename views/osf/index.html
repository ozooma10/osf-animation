<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- All assets local: no network, no external fonts (sandbox forbids both). -->
  <title>OSF Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="app" aria-hidden="false">

    <!-- ── Instrument header ─────────────────────────────────────────── -->
    <header class="topbar">
      <div class="brand">
        <!-- Amber "armature" glyph = the Animation module accent in the OSF family. -->
        <svg class="brand-glyph" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="5" cy="19" r="2.2"></circle>
          <circle cx="19" cy="5" r="2.2"></circle>
          <circle cx="12" cy="12" r="1.6"></circle>
          <path d="M5 19 L12 12 L19 5"></path>
        </svg>
        <span class="brand-name">OSF<b>ANIMATION</b></span>
        <span class="brand-tag">SCENE&nbsp;DIRECTOR</span>
      </div>

      <div class="status">
        <span id="lamp" class="lamp" data-state="wait"></span>
        <span id="statusText" class="status-text">CONNECTING…</span>
        <span class="divider"></span>
        <span id="sceneCount" class="metric">—&nbsp;SCENES</span>
        <button id="refresh" class="btn btn-ghost" type="button">REFRESH</button>
      </div>
    </header>

    <!-- ── Main instrument grid ──────────────────────────────────────── -->
    <main class="layout">

      <!-- Filter rail -->
      <aside class="rail panel">
        <h2 class="panel-title">FILTERS</h2>

        <label class="field">
          <span class="field-label">SEARCH</span>
          <input id="search" class="input" type="text" placeholder="title, id, tag…" autocomplete="off">
        </label>

        <div class="field">
          <span class="field-label">CAST SIZE</span>
          <div id="countFilter" class="seg" role="group">
            <button class="seg-btn is-on" data-count="any" type="button">ANY</button>
            <button class="seg-btn" data-count="1" type="button">1</button>
            <button class="seg-btn" data-count="2" type="button">2</button>
            <button class="seg-btn" data-count="3" type="button">3+</button>
          </div>
        </div>

        <div class="field">
          <span class="field-label">FURNITURE</span>
          <div id="furnFilter" class="seg" role="group">
            <button class="seg-btn is-on" data-furn="any" type="button">ANY</button>
            <button class="seg-btn" data-furn="yes" type="button">NEEDS</button>
            <button class="seg-btn" data-furn="no" type="button">FREE</button>
          </div>
        </div>

        <label class="check">
          <input id="fitsCast" type="checkbox">
          <span>Fits my cast</span>
        </label>

        <div class="field grow">
          <span class="field-label">TAGS</span>
          <div id="tagCloud" class="tag-cloud"></div>
        </div>
      </aside>

      <!-- Scene card grid -->
      <section class="catalog panel">
        <div class="catalog-head">
          <h2 class="panel-title">SCENES</h2>
          <span id="resultCount" class="panel-note"></span>
        </div>
        <div id="grid" class="grid-scroll" role="list"></div>
        <div id="empty" class="empty hidden">NO SCENES MATCH THE CURRENT FILTERS.</div>
      </section>

      <!-- Inspector: detail + cast + options + launch -->
      <aside class="inspector panel">
        <div id="detail" class="detail">
          <p class="detail-empty">SELECT A SCENE TO INSPECT.</p>
        </div>

        <div class="tray">
          <h3 class="tray-title">CAST</h3>
          <ul id="castList" class="cast-list"></ul>
          <div class="tray-actions">
            <button id="addActor" class="btn btn-ghost" type="button">+ CROSSHAIR ACTOR</button>
          </div>

          <h3 class="tray-title">FURNITURE</h3>
          <div id="furnSlot" class="furn-slot">
            <span class="slot-empty">NONE</span>
          </div>
          <div class="tray-actions">
            <button id="pickFurniture" class="btn btn-ghost" type="button">USE CROSSHAIR FURNITURE</button>
            <button id="clearFurniture" class="btn btn-ghost hidden" type="button">CLEAR</button>
          </div>
        </div>

        <div class="options">
          <h3 class="tray-title">OPTIONS</h3>
          <div class="opt-row">
            <label class="opt">
              <span class="field-label">STRIP</span>
              <select id="optStrip" class="select">
                <option value="-1">Inherit</option>
                <option value="1">On</option>
                <option value="0">Off</option>
              </select>
            </label>
            <label class="opt">
              <span class="field-label">LOCK PLAYER</span>
              <select id="optLock" class="select">
                <option value="-1">Inherit</option>
                <option value="1">On</option>
                <option value="0">Off</option>
              </select>
            </label>
          </div>
          <div class="opt-row">
            <label class="opt">
              <span class="field-label">CAMERA</span>
              <select id="optCamera" class="select">
                <option value="">Inherit</option>
                <option value="thirdperson_hold">Third person</option>
                <option value="scene_orbit">Scene orbit</option>
                <option value="freefly">Free fly</option>
                <option value="vanity_orbit">Vanity orbit</option>
              </select>
            </label>
            <label class="opt">
              <span class="field-label">SPEED&nbsp;·&nbsp;<b id="speedVal">1.0×</b></span>
              <input id="optSpeed" class="range" type="range" min="0.1" max="3" step="0.1" value="1">
            </label>
          </div>
        </div>

        <div class="launch">
          <button id="play" class="btn btn-primary" type="button" disabled>PLAY</button>
          <button id="stop" class="btn btn-danger" type="button" disabled>STOP</button>
        </div>
        <p id="launchReason" class="launch-reason"></p>
      </aside>
    </main>

    <!-- Status / failure strip -->
    <footer id="notice" class="notice" aria-live="polite"></footer>
  </div>

  <!-- Software pointer (the OS cursor is hidden in-game). -->
  <div id="cursor" class="cursor" aria-hidden="true"></div>

  <script src="main.js"></script>
</body>
</html>
