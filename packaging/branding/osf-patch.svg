<svg xmlns="http://www.w3.org/2000/svg" viewBox="32 32 616 616" width="1024" height="1024" role="img" font-family="Bahnschrift, 'DIN Next', 'Oswald', 'Segoe UI Semibold', sans-serif">
<title>OSF Animation mission patch</title>
<desc>A circular embroidered mission patch. Amber merrowed border with EST MMXXVI curved across the top and OPEN SCENE FRAMEWORK across the bottom, flanked by amber stars. In the center, the bold wordmark OSF in brushed steel over ANIMATION in amber with an amber accent bar. Below it, a gently eased amber animation playback curve carrying diamond keyframe nodes and a glowing ringed playhead star, over a faint timeline baseline and a dark Starfield planet limb, on near-black with a faint starfield.</desc>
