<svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg" role="img">
<title>OSF Animation icon</title>
<desc>Tiny-size OSF mark: a bold eased amber playback curve rising diagonally from a diamond keyframe to a 4-point target-keyframe star, with a solid ringed playhead dot at its midpoint.</desc>
<!-- Every node is centred ON the curve: start (8,50), midpoint (30,33), end (52,16). -->
<path d="M8 50 C28 50 32 16 52 16" fill="none" stroke="#d98a4a" stroke-width="4.6" stroke-linecap="round"/>
<path d="M8 43 L15 50 L8 57 L1 50 Z" fill="#e8a45a"/>
<path d="M52 4.5 L55.1 12.9 L63.5 16 L55.1 19.1 L52 27.5 L48.9 19.1 L40.5 16 L48.9 12.9 Z" fill="#e8a45a"/>
<!-- Playhead, patch-style: opaque dark core so the curve never peeks through
     the ring, amber ring, cream pip. -->
<circle cx="30" cy="33" r="8.2" fill="#0c1118" stroke="#e0a05c" stroke-width="3.2"/>
<circle cx="30" cy="33" r="3.2" fill="#f3ddc2"/>
</svg>
