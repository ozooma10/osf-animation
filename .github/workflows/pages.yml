name: Deploy docs site

# Publishes the static documentation site in `site/` to GitHub Pages.
# One-time setup: repo Settings → Pages → "Build and deployment" → Source = "GitHub Actions".
# (A public repo — or a paid plan — is required for the published site to be public.)

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:   # allow manual runs from the Actions tab

# Least-privilege token scoped for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
