  </radialGradient>
  <radialGradient id="hvig" cx="50%" cy="45%" r="75%">
    <stop offset="0.55" stop-color="#0b0e12" stop-opacity="0"/><stop offset="1" stop-color="#04060a" stop-opacity="0.7"/>
