<title>OSF Animation header banner</title>
<desc>A wide NASA-punk header: the OSF Animation mission patch at left, with the large wordmark OSF in brushed steel and ANIMATION in burnt amber to the right over the tagline Animation and Scene Framework, on a near-black starfield with a dark planet limb and steel HUD corner brackets.</desc>
