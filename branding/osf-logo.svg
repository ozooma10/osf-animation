<svg width="100%" viewBox="0 0 1000 280" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Bahnschrift, 'DIN Next', 'Oswald', 'Segoe UI Semibold', 'Segoe UI', sans-serif">
<title>OSF Animation logo lockup (horizontal)</title>
<desc>Horizontal NASA-punk lockup: an amber articulated armature figure mid-stride at left, with the wordmark OSF in brushed-steel grey and ANIMATION in burnt amber on one line to the right. Faint starfield, halo and steel HUD corner brackets on near-black.</desc>
<!-- ============================================================
     OSF ANIMATION — primary logo, horizontal lockup (2026-06-18)
     Composition: emblem left, one-line wordmark right.
     Palette: burnt amber (#e6904a/#c2622f) + brushed steel (#c8ced5/#828a93)
     on near-black #0b0e12. Font: Bahnschrift/DIN (ships on Win11).
     ============================================================ -->
<defs>
  <linearGradient id="osf" x1="0" y1="120" x2="0" y2="186" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#c8ced5"/><stop offset="1" stop-color="#828a93"/>
  </linearGradient>
  <linearGradient id="anim" x1="300" y1="130" x2="900" y2="180" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#e6904a"/><stop offset="0.55" stop-color="#cf8050"/><stop offset="1" stop-color="#c2622f"/>
  </linearGradient>
  <radialGradient id="halo" cx="20%" cy="50%" r="34%">
    <stop offset="0" stop-color="#c2622f" stop-opacity="0.14"/><stop offset="1" stop-color="#c2622f" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gmask" cx="50%" cy="50%" r="62%">
    <stop offset="0" stop-color="#fff"/><stop offset="0.6" stop-color="#fff" stop-opacity="0.35"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="vig" cx="50%" cy="50%" r="72%">
    <stop offset="0.5" stop-color="#0b0e12" stop-opacity="0"/><stop offset="1" stop-color="#04060a" stop-opacity="0.6"/>
  </radialGradient>
  <mask id="gm"><rect width="1000" height="280" fill="url(#gmask)"/></mask>
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M24 0 H0 V24" fill="none" stroke="#8c96a6" stroke-opacity="0.04" stroke-width="0.5"/>
  </pattern>
</defs>

<rect width="1000" height="280" fill="#0b0e12"/>
<rect width="1000" height="280" fill="url(#grid)" mask="url(#gm)"/>
<rect width="1000" height="280" fill="url(#halo)"/>

<g fill="#e6e2d8">
  <circle cx="70" cy="44" r="1.1" opacity="0.5"/><circle cx="150" cy="92" r="0.7" opacity="0.35"/>
  <circle cx="240" cy="38" r="1.2" opacity="0.5"/><circle cx="520" cy="52" r="1" opacity="0.45"/>
  <circle cx="700" cy="40" r="0.9" opacity="0.4"/><circle cx="880" cy="62" r="1.1" opacity="0.5"/>
  <circle cx="60" cy="208" r="0.9" opacity="0.42"/><circle cx="300" cy="236" r="0.7" opacity="0.32"/>
  <circle cx="620" cy="232" r="0.8" opacity="0.38"/><circle cx="930" cy="210" r="0.7" opacity="0.34"/>
  <circle cx="420" cy="30" r="0.7" opacity="0.33"/><circle cx="800" cy="226" r="0.9" opacity="0.4"/>
</g>

<!-- emblem: armature only, no ring -->
<g transform="translate(167.4,138.7) scale(1.7)">
  <g fill="none" stroke="#d2722f" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -6.2 -39.5 L 6.2 1.55"/>
    <path d="M 32.6 -35.7 L 20.2 -21.7 L 0 -31 L -15 -16 L -29.5 -12"/>
    <path d="M 17 48 L 23.3 20.2 L 6.2 1.55 L -10.9 18 L -26.4 30"/>
    <circle cx="-6.2" cy="-46.5" r="7.1"/>
  </g>
  <g fill="#f0ece2">
    <circle cx="0" cy="-31" r="2.9"/><circle cx="20.2" cy="-21.7" r="2.6"/><circle cx="-15" cy="-16" r="2.6"/>
    <circle cx="6.2" cy="1.55" r="2.9"/><circle cx="23.3" cy="20.2" r="2.6"/><circle cx="-10.9" cy="18" r="2.6"/>
  </g>
</g>

<!-- wordmark: one line, emblem-right -->
<text x="313" y="156" font-size="80" font-weight="700" letter-spacing="3"><tspan fill="url(#osf)">OSF </tspan><tspan fill="url(#anim)">ANIMATION</tspan></text>

<!-- byline -->
<g stroke="#4d9aa8" stroke-opacity="0.5" stroke-width="1">
  <line x1="316" y1="195" x2="346" y2="195"/><line x1="316" y1="192" x2="316" y2="198"/>
</g>
<text x="360" y="200" font-size="15" font-weight="500" letter-spacing="3.4" fill="#aeb6bf">NATIVE ANIMATION &amp; SCENE FRAMEWORK</text>

<!-- HUD corner brackets -->
<g fill="none" stroke="#4d9aa8" stroke-opacity="0.45" stroke-width="1.3">
  <path d="M18 42 V18 H42"/><path d="M982 42 V18 H958"/>
  <path d="M18 238 V262 H42"/><path d="M982 238 V262 H958"/>
</g>

<rect width="1000" height="280" fill="url(#vig)"/>
</svg>
